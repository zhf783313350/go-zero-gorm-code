name: Go GitHub Actions CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ==========================================
  # 阶段一：持续集成 (CI) - 自动测试与编译检查
  # ==========================================
  go-ci-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Go environment
      uses: actions/setup-go@v5
      with:
        go-version: '1.26' # 匹配你本地最新的 Go 1.26 版本

    - name: Install dependencies
      run: go mod download

    - name: Build project
      run: go build -v ./...

    - name: Run automated tests
      run: go test -v -race ./...

  # ==========================================
  # 阶段二：持续部署 (CD) - 自动连上阿里云重启容器
  # ==========================================
  deploy:
    runs-on: ubuntu-latest
    needs: go-ci-pipeline # 必须等上面的 CI 编译测试成功后，才会执行部署
    if: github.event_name == 'push' # 只有真正 push 代码时才触发部署，PR 拦截不部署

    steps:
    - name: Deploy to Alibaba Cloud
      uses: appleboy/ssh-action@v1.0.3 # 行业标准的官方远程 SSH 插件
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: 22
        script: |
          cd /home/go-zero-gorm-code
          
          # 严格拉取最新源码
          git pull origin master
          
          # 🔥 核心修复：加上 --no-cache，彻底粉碎 Docker 缓存，逼它每次都重新 go build
          docker compose build --no-cache
          docker compose up -d --force-recreate