Name: access-control-api
Host: 0.0.0.0
Port: 8082

# 日志配置
Log:
  Mode: console
  Level: info
  Stat: false

# 数据库配置 (PostgreSQL)
Database:
  Host: localhost
  Port: 15432
  User: postgres
  Password: "123456"
  DBName: access_control
  SSLMode: disable
  MaxOpenConns: 20
  MaxIdleConns: 5
  ConnMaxLifetime: 3600

# 全局限流配置
RateLimiter:
  Rate: 100
  Burst: 100

# Redis配置
Redis:
  Host: localhost:6379
  Password: ""
  DB: 0
  PoolSize: 20
  MinIdleConns: 5

# JWT配置
Auth:
  AccessSecret: "your-secret-key-change-in-production"
  AccessExpire: 86400
