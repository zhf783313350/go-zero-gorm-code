Name: access-control-api
Host: 0.0.0.0
Port: 8080                # 👈 严格采用 go-zero 官方默认端口 8080

# 日志配置
Log:
  Mode: console
  Level: info
  Stat: false

# 数据库配置 (PostgreSQL)
Database:
  Host: postgres          # Docker 内部网络直接用服务名互联
  Port: 5432              # 👈 严格采用 Postgres 官方默认端口 5432
  User: postgres
  Password: "123456"
  DBName: zero_gorm_code
  SSLMode: disable
  MaxOpenConns: 20
  MaxIdleConns: 5
  ConnMaxLifetime: 3600

# 全局限流配置
RateLimiter:
  Rate: 100
  Burst: 100

# Redis配置
Redis:
  Host: redis:6379        # 👈 严格采用 Redis 官方默认端口 6379，并用服务名互联
  Password: ""
  DB: 0
  PoolSize: 20
  MinIdleConns: 5

# JWT配置
Auth:
  AccessSecret: "your-secret-key-change-in-production"
  AccessExpire: 86400